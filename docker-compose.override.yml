services:
  api:
    environment:
      - REDIS_URL=redis://redis:6379
      - API_KEY=default_internal_key
      - SESSION_INACTIVITY_TIMEOUT=1800
      - EXTRACTION_API_BASE=http://host.docker.internal:20022/v1/
      - EXTRACTION_API_KEY=lm-studio
      - EXTRACTION_MODEL_NAME=jinaai.readerlm-v2
      - ORCHESTRATION_API_BASE=http://host.docker.internal:20022/v1/
      - ORCHESTRATION_API_KEY=no
      - ORCHESTRATION_MODEL_NAME=qwen3.5-9b-claude-4.6-opus-reasoning-distilled
    extra_hosts:
      - "host.docker.internal:host-gateway"
  worker:
    command: ["uv", "run", "taskiq", "worker", "src.infrastructure.queue.broker:broker", "src.infrastructure.queue.session_actor", "src.infrastructure.queue.cleanup_worker", "src.infrastructure.queue.workers"]
    environment:
      - REDIS_URL=redis://redis:6379
      - API_KEY=default_internal_key
      - SESSION_INACTIVITY_TIMEOUT=1800
      - EXTRACTION_API_BASE=http://host.docker.internal:20022/v1/
      - EXTRACTION_API_KEY=lm-studio
      - EXTRACTION_MODEL_NAME=jinaai.readerlm-v2
      - ORCHESTRATION_API_BASE=http://host.docker.internal:20022/v1/
      - ORCHESTRATION_API_KEY=no
      - ORCHESTRATION_MODEL_NAME=qwen3.5-9b-claude-4.6-opus-reasoning-distilled
    extra_hosts:
      - "host.docker.internal:host-gateway"
