# Явно выключаем заведомо-плохие/онион-движки, чтобы они не тянули
# request_timeout впустую перед попаданием в suspended.
engines:
  - name: brave
    disabled: true
  - name: startpage
    disabled: true
  - name: karmasearch
    disabled: true
  - name: karmasearch videos
    disabled: true
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
