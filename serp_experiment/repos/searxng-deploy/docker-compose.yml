# Локальный SearXNG для serp_experiment.
#
# Запуск:
#   1. uv run python -m serp_experiment.proxy_router --generate-only
#      → сгенерирует probe/searxng-probe-{1..K}/settings.yml
#   2. docker compose up -d
#      → поднимет searxng (prod) + K searxng-probe-* инстансов
#   3. uv run python -m serp_experiment.proxy_router
#      → стартанёт router (на хосте), подцепится к probe-инстансам
#
# Prod-SearXNG: http://localhost:8080/  (ходит на http://host.docker.internal:8888 = router main)
# Probe-SearXNG: http://localhost:8081..8084/  (ходят на host.docker.internal:9001..9004 = router probe)
services:

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: serp-exp-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET=serp-exp-${RANDOM:-changeme}
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=4
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  searxng-probe-1:
    image: docker.io/searxng/searxng:latest
    container_name: serp-exp-searxng-probe-1
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./probe/searxng-probe-1:/etc/searxng:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
      - SEARXNG_SECRET=serp-exp-probe-1
      - UWSGI_WORKERS=1
      - UWSGI_THREADS=2
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  searxng-probe-2:
