services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scraper-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - scraper-network
    volumes:
      - ./proxies.txt:/app/proxies.txt:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "taskiq", "worker", "src.infrastructure.queue.broker:broker", "src.infrastructure.queue.tasks"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scraper-network
    volumes:
      - ./proxies.txt:/app/proxies.txt:ro

networks:
  scraper-network:
    driver: bridge
